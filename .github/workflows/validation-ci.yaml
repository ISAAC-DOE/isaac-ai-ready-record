name: Validation Battery

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  battery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install jsonschema rfc3339-validator PyYAML GitPython requests pytest

      - name: Run validation battery
        run: |
          pytest tests/test_validation_battery.py -v --tb=short

      - name: Check wiki generated sections freshness
        run: |
          if git clone --depth 1 https://github.com/ISAAC-DOE/isaac-ai-ready-record.wiki.git /tmp/wiki; then
            python3 tools/generate_schema_diagram.py --check /tmp/wiki/Schema-Architecture.md
            python3 tools/generate_wiki_vocab.py --check /tmp/wiki
          else
            echo "::warning::wiki clone failed — freshness check skipped"
          fi
